<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8. 데이터의 세계</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 22px;
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    position: absolute; top: 0; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    border-right: 1px solid var(--bg-void);
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) */
.map-segment:nth-child(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-child(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    position: absolute; top: 0; height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="게임의_뼈대를_세우는_정교한_데이터_설계.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)">⏪</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="skip-btn" onclick="skipTime(10)">⏩</button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
    <div id="audio-map"></div>
  </div>
  <div id="slide-nav"></div>
  <div id="main-layout">
    <div id="slide-area">
      <div id="slide-container">
        <div id="slide-header">
          <span id="slide-id"></span>
          <span id="slide-badge"></span>
        </div>
        <h1 id="slide-title"></h1>
        <div id="slide-content"></div>
      </div>
    </div>
    <div id="index-panel">
      <div id="index-header">목차</div>
      <div id="index-list"></div>
    </div>
  </div>
</div>
<div id="subtitle-bar">
  <span id="subtitle-text"></span>
</div>
<script>
const SLIDES = [
  {
    "id": "P1",
    "title": "“어떤 정보가 필요한가?”",
    "content": "<div class=\"slide-text\">게임을 설계할 때 가장 먼저 던져야 할 질문이다.<br>필요한 정보를 정의하는 것이 데이터 설계의 첫 걸임다.</div>",
    "hasAudio": true,
    "start": 0.0,
    "end": 100.0
  },
  {

  {
    "id": "P3",
    "title": "데이터 타입",
    "content": "<div class=\"slide-text\">데이터에는 다양한 형태(Type)가 있으며, 각 타입에 맞게 저장해야 한다.</div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-card\"><div class=\"card-heading\">숫자</div><div class=\"card-desc\">정수, 실수 등 수치 데이터</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">날짜</div><div class=\"card-desc\">날짜 및 시간 정보</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">문자</div><div class=\"card-desc\">이름, 설명 등 텍스트</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">바이너리 (2진수)</div><div class=\"card-desc\">파일, 이미지 등</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">화폐</div><div class=\"card-desc\">금액 데이터</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">특수 (UID, 타임)</div><div class=\"card-desc\">고유 식별자, 타임스태프</div></div>",
    "hasAudio": true,
    "start": 149.0,
    "end": 215.0
  },
  {
    "id": "P4",
    "title": "데이터 스트럭쳐",
    "content": "<div class=\"slide-quote\">자료를 효율적으로 저장하고 사용하기 쉽게 만드는 작업</div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-text\">흩어진 정보를 <strong>분류→구성→저장</strong>하는 과정이 바로 데이터 구조화다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">Q</div><div class=\"card-desc\">: 그렇다면 클래스 다이어그램으로 흩어진 데이터를 모은다는 것인가?</div></div>\n<div class=\"slide-text\"></div>",
    "hasAudio": true,
    "start": 215.0,
    "end": 280.0
  },
  {
    "id": "P5",
    "title": "용어 정리",
    "content": "<div class=\"slide-text\">같은 개념이지만 현업에서 쓰는 용어가 조금씩 다르다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">데이터=자료</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">데이터 타입=자료형</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">데이터 구조=자료구조</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">프로그래머들은 ‘<strong>자료</strong>’보다 ‘<strong>데이터</strong>’라는 말을 선호한다. ‘자료’는 가공 전 원자료(Raw Data), ‘데이터’는 정보(Information)를 만들 수 있는 형태로 구분하기 때문이다.</div></div>",
    "hasAudio": true,
    "start": 255.0,
    "end": 300.0
  },
  {
    "id": "P6",
    "title": "어떤 것이 좋은 자료 구조일까?",
    "content": "<div class=\"slide-text\"></div>\n<div class=\"slide-text\">오른쪽이 검색/수정/관리에 훨신 용이하다</div>",
    "hasAudio": true,
    "start": 280.0,
    "end": 310.0
  },
  {
    "id": "P7",
    "title": "데이터 구조의 종류",
    "content": "<div class=\"slide-text\">데이터 구조는 크게 <strong>선형 구조</strong>와 <strong>비선형 구조</strong>로 나뉜다.</div>\n<div class=\"slide-text\"></div>",
    "hasAudio": true,
    "start": 293.0,
    "end": 350.0
  },
  {
    "id": "P8",
    "title": "리스트",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">배열 형태</div><div class=\"card-desc\">로 저장되는 연속적인 데이터 구조</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">배열(Array)</div><div class=\"card-desc\">연관된 데이터를 그룹으로 묶어 관리하는 방법</div></div>\n<ul class=\"slide-points\"><li>데이터 처리는 <strong>순서대로</strong> 진행</li><li>검색 속도는 빠르지만 <strong>중간 삽입/삭제가 느림</strong> <strong>Ex)</strong> 기차 좌석, 출석부</li></ul>\n<div class=\"slide-text\"></div>",
    "hasAudio": true,
    "start": 294.0,
    "end": 350.0
  },
  {
    "id": "P9",
    "title": "스택",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">쌓는 형태</div><div class=\"card-desc\">의 데이터 구조로, 마지막에 넣은 것을 먼저 꺼낸다. (순서 O)</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-card\"><div class=\"card-heading\">LIFO</div><div class=\"card-desc\">: Last In, First Out → <strong>선입후출</strong></div></div>\n<div class=\"slide-text\">쌓아 놓은 접시를 생각해보자. 맨 위의 접시부터 꺼내야 한다. 옷을 입고 벗는 것도 같은 원리이다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex)</div><div class=\"card-desc\">뒤로가기, 작업 취소</div></div>",
    "hasAudio": true,
    "start": 350.0,
    "end": 400.0
  },
  {
    "id": "P10",
    "title": "큐",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">먼저 온 데이터부터</div><div class=\"card-desc\">처리하는 구조. 줄서기와 같은 원리 (순서 O)</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-card\"><div class=\"card-heading\">FIFO</div><div class=\"card-desc\">: First In, First Out</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex)</div><div class=\"card-desc\">서비스 센터 대기열, 놀이기구 줄서기</div></div>",
    "hasAudio": true,
    "start": 400.0,
    "end": 445.0
  },
  {
    "id": "P11",
    "title": "트리",
    "content": "<div class=\"slide-quote\">계층적으로 연결이 필요한 자료를 저장하는 데이터 구조</div>\n<ul class=\"slide-points\"><li>뿌리(Root)와 가지(Branch)로 구성</li><li>스킬 트리, 퀘스트 등 하위 구조가 복잡해지거나 항목 별 저장값이 제각각일 때 사용</li><li>Lua 스크립트, HTML, XML 등의 형태로 저장 가능</li></ul>",
    "hasAudio": true,
    "start": 429.0,
    "end": 470.0

ss=\"card-desc\">아이템이 주는 효과를 따로 분리하여 신규 객체의 기획이 간단해진다</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex)</div><div class=\"card-desc\">기간제 포션 사용</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-text\">→ <strong>이펙트 쌀먹 가능!</strong></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">[주의할 점]<br><strong>서비스가 시작되면 고유키(ID값)는 변경할 수 없다.</strong><br>- DB에 저장된 ID로 아이템을 검색<br>- ID가 변경되면 찾을 수 없다<br>- 경우에 따라선 게임이 셧다운 될 수도 있다.<br>(체력 물약의 속성을 찾으려고 원래 ID를 검색하는데 안나와! 나올때까지 계속 찾아!)</div></div>",

const TRANSCRIPT = [{"start": 0.0, "end": 2.72, "text": "청취자님 한번 상상해 보시죠"}, {"start": 2.72, "end": 5.68, "text": "무려 100시간의 고된 레이드 끝에"}, {"start": 5.68, "end": 8.2, "text": "드디어 최종 보스를 쓸어트렸습니다"}, {"start": 8.2, "end": 9.84, "text": "아 정말 짜릿한 순간이죠"}, {"start": 9.84, "end": 12.44, "text": "그쵸 막 화려한 빛 기둥이 솟아오르고"}, {"start": 12.44, "end": 15.68, "text": "바닥에는 전설의 검이 딱 떨어져 있단 말이에요"}, {"start": 15.68, "end": 18.88, "text": "그런데 떨리는 손으로 그걸 줍는 순간"}, {"start": 18.88, "end": 21.0, "text": "화면에 아이템 획득 대신에"}, {"start": 21.0, "end": 24.76, "text": "막 에러코드 11111060 이런게 뜨면서"}, {"start": 24.76, "end": 27.72, "text": "게임이 강제 종료된다면 어떠실 것 같나요?"}, {"start": 27.72, "end": 30.16, "text": "어 아마 키보드가 무사하지 못할 겁니다"}, {"start": 30.16, "end": 32.24, "text": "네 완전히 박살이 나겠죠"}, {"start": 32.24, "end": 34.16, "text": "우리는 늘 화면 속 세상이 진짜"}, {"start": 34.16, "end": 37.44, "text": "살아 숨 쉬는 것처럼 완벽하게 굴러가길 기대하잖아요"}, {"start": 37.44, "end": 38.879999999999995, "text": "맞습니다"}, {"start": 38.879999999999995, "end": 41.2, "text": "하지만 그 완벽한 무력감과 생동감은"}, {"start": 41.2, "end": 43.6, "text": "사실 거저주어지는 것이 아닙니다"}, {"start": 43.6, "end": 45.120000000000005, "text": "아주 정교하게 통제되고"}, {"start": 45.120000000000005, "end": 47.56, "text": "음 치밀하게 계산된 환상이죠"}, {"start": 47.56, "end": 49.72, "text": "유저들이 그 환상을 깨짐없이 즐길 수 있도록"}, {"start": 49.72, "end": 52.84, "text": "뼈들을 세우는 사람들이 바로 게임 기획자들입니다"}, {"start": 52.84, "end": 55.2, "text": "그래서 오늘 우리는 눈앞에서 터지는"}, {"start": 55.2, "end": 57.480000000000004, "text": "화려한 그래픽이나 타격감이라는 껍질을"}, {"start": 57.480000000000004, "end": 59.68000000000001, "text": "완전히 한번 벗겨내 보려고 합니다"}, {"start": 59.68000000000001, "end": 61.720000000000006, "text": "청취자님 오늘 우리의 심층 분석 시간에"}, {"start": 61.720000000000006, "end": 63.2, "text": "오신 것을 환영합니다"}, {"start": 63.2, "end": 64.56, "text": "네 반갑습니다"}, {"start": 64.56, "end": 66.96000000000001, "text": "오늘 청취자님과 함께 해체해 볼 자료는"}, {"start": 66.96000000000001, "end": 69.56, "text": "바로 게임 기획을 처음 배우는 사람들을 위한"}, {"start": 69.56, "end": 72.08, "text": "실전 데이터 설계 강의입니다"}, {"start": 72.08, "end": 74.4, "text": "우리가 몬스터를 잡고 아이템을 얻는"}, {"start": 74.4, "end": 76.32000000000001, "text": "그 즐거운 과정 이면에"}, {"start": 76.32000000000001, "end": 80.2, "text": "현업의 기획자들이 도대체 어떻게 정보를 쪼개고 조립하는지"}, {"start": 80.2, "end": 82.44, "text": "그 거대한 매트릭스 속으로 들어가보는 것이"}, {"start": 82.44, "end": 84.28, "text": "오늘 심층 분석의 미션입니다"}, {"start": 84.28, "end": 85.92, "text": "아주 흥미로운 주제네요"}, {"start": 85.92, "end": 88.36, "text": "이번 자료가 시사하는 반은 명확합니다"}, {"start": 88.36, "end": 90.72, "text": "눈에 보이는 화려한 그래픽 이전에"}, {"start": 90.72, "end": 93.2, "text": "우리 시스템에 도대체 어떤 정보가 필요한가"}, {"start": 93.2, "end": 95.84, "text": "를 묻는 것이 기획의 진짜 첫 걸음이라는 사실을"}, {"start": 95.84, "end": 97.12, "text": "아주 잘 보여주고 있죠"}, {"start": 97.12, "end": 98.68, "text": "좋습니다 그럼 그 첫 걸음인"}, {"start": 98.68, "end": 101.04, "text": "정보의 정의부터 파헤쳐보죠"}, {"start": 101.04, "end": 102.84, "text": "기획에서 정보를 다룬다는 건"}, {"start": 102.84, "end": 104.48, "text": "구체적으로 어떤 의미인가요?"}, {"start": 104.48, "end": 107.08, "text": "네 게임 설계의 첫 걸음은"}, {"start": 107.08, "end": 109.16, "text": "필요한 정보를 정의하고"}, {"start": 109.16, "end": 112.16, "text": "이를 컴퓨터가 효율적으로 처리할 수 있는"}, {"start": 112.16, "end": 115.52, "text": "규격화된 형태인 데이터로 만드는 것입니다"}, {"start": 115.52, "end": 119.44, "text": "어 잠시만요 그게 정확히 무슨 말이에요?"}, {"start": 119.44, "end": 122.47999999999999, "text": "규격화된 형태라는 게 마치 서류를"}, {"start": 122.47999999999999, "end": 125.8, "text": "크기별로 봉투에 따로 닫는 것과 같은 건가요?"}, {"start": 125.8, "end": 129.04, "text": "오 아주 정확하고 훌륭한 비유입니다"}, {"start": 129.04, "end": 131.07999999999998, "text": "맞습니다 예를 들어서"}, {"start": 131.07999999999998, "end": 134.16, "text": "걸그룹 멤버의 데빌이라는 정보를"}, {"start": 134.16, "end": 136.04, "text": "시스템에 넣는다고 가정해 보죠"}, {"start": 136.04, "end": 139.6, "text": "식할 수 있는 날짜라는 명확한 데이터 타입으로"}, {"start": 139.6, "end": 141.16, "text": "지정해서 저장해야"}, {"start": 141.16, "end": 143.84, "text": "컴퓨터가 용량을 훨씬 덜 차지하고"}, {"start": 143.84, "end": 145.48, "text": "빠르게 계산할 수 있습니다"}, {"start": 145.48, "end": 149.8, "text": "아하 그럼 그렇게 용량을 줄이기 위해 지정하는"}, {"start": 149.8, "end": 153.48, "text": "그 데이터 타입에는 구체적으로 어떤 종류들이 있고"}, {"start": 153.48, "end": 155.35999999999999, "text": "또 어떻게 구둔되는 건가요?"}, {"start": 155.35999999999999, "end": 158.51999999999998, "text": "데이터 타입은 정보의 성격에 따라"}, {"start": 158.51999999999998, "end": 163.68, "text": "숫자, 날짜, 문자, 바이너리, 화폐"}, {"start": 163.68, "end": 167.44, "text": "그리고 특수식별자 등으로 형태를 분류한 기준입니다"}, {"start": 167.44, "end": 169.8, "text": "어 근데 그게 정확히 무슨 말이에요?"}, {"start": 169.84, "end": 172.28, "text": "아니 숫자면 다 똑같은 숫자지"}, {"start": 172.28, "end": 175.04000000000002, "text": "왜 굳이 화폐나 특수한 식별자까지"}, {"start": 175.04000000000002, "end": 176.92000000000002, "text": "세세하게 따로 분류해야 하나요?"}, {"start": 176.92000000000002, "end": 179.76000000000002, "text": "이게 사실 굉장히 중요한 포인트인데요"}, {"start": 179.76000000000002, "end": 181.92000000000002, "text": "시스템의 붕괴를 막기 위해서입니다"}, {"start": 181.92000000000002, "end": 182.68, "text": "붕괴요?"}, {"start": 182.68, "end": 185.84, "text": "네 게임 내 주요 재화인 골드를"}, {"start": 185.84, "end": 189.04000000000002, "text": "단순 숫자가 아니라 화폐 타입으로 따로 묶고"}, {"start": 189.04000000000002, "end": 192.0, "text": "또 아이템의 고유번호를 UID"}, {"start": 192.0, "end": 195.32000000000002, "text": "즉 고유식별자로 분리해 두어야만 하거든요"}, {"start": 195.32000000000002, "end": 197.16000000000003, "text": "어 안 그러면 어떻게 되는데요?"}, {"start": 197.16000000000003, "end": 198.76000000000002, "text": "만약 분리하지 않으면"}, {"start": 198.76, "end": 201.79999999999998, "text": "시스템상에서 골드 수치가 한 바퀴를 돌아"}, {"start": 201.79999999999998, "end": 204.79999999999998, "text": "마이너스가 되거나 골드복사버그 같은"}, {"start": 204.79999999999998, "end": 207.51999999999998, "text": "아주 치명적 오류가 발생할 수 있습니다"}, {"start": 207.51999999999998, "end": 211.44, "text": "이런 오류 없이 경제 시스템을 정확히 굴릴 수 있기 때문에"}, {"start": 211.44, "end": 213.0, "text": "철저히 분류하는 거죠"}, {"start": 213.0, "end": 215.92, "text": "어우 듣기만 해도 식은땀이 나네요"}, {"start": 215.92, "end": 218.39999999999998, "text": "그럼 그렇게 각자의 타입표를 달고"}, {"start": 218.39999999999998, "end": 223.12, "text": "쪼개진 무수히 많은 정보들은 굉장히 산발적일 텐데"}, {"start": 223.12, "end": 225.92, "text": "이 화폐나 텐 데이터들은 어떻게 하나로 묶여서"}, {"start": 225.92, "end": 227.6, "text": "구조를 잡게 되는 건가요?"}, {"start": 227.6, "end": 231.35999999999999, "text": "그 시점에서 이제 흩어진 가공전의 원자료"}, {"start": 231.35999999999999, "end": 234.07999999999998, "text": "그러니까 로데이터를 분류하고 구성해서"}, {"start": 234.07999999999998, "end": 236.28, "text": "나중에 검색이나 수정이 쉽도록"}, {"start": 236.28, "end": 239.32, "text": "유의미한 정보에 틀로 짜는 작업이 들어갑니다"}, {"start": 239.32, "end": 242.68, "text": "이게 바로 데이터 스트럭쳐 즉 자료 구조입니다"}, {"start": 242.68, "end": 244.68, "text": "그게 정확히 무슨 말이에요?"}, {"start": 244.68, "end": 249.79999999999998, "text": "프로그래머들이 자료라는 말 대신 데이터라는 말을 더 좋아한다고 하던데"}, {"start": 249.79999999999998, "end": 254.16, "text": "그냥 묶어두는 것과 구조를 짠다는 건 어떤 차이가 있는 거죠?"}, {"start": 254.16, "end": 256.32, "text": "음 이렇게 생각해 보시죠"}, {"start": 256.32, "end": 260.08, "text": "온갖 잡동산이를 상자에 마구잡이로 던져두는 게"}, {"start": 260.08, "end": 262.24, "text": "가공전의 자료라면요"}, {"start": 262.24, "end": 264.32, "text": "클래스 다이어램 같은 도구를 써서"}, {"start": 264.32, "end": 266.0, "text": "무기는 무기 카테고리"}, {"start": 266.0, "end": 268.0, "text": "방어구는 방어구 카테고리별로"}, {"start": 268.0, "end": 272.44, "text": "서랍장을 짜고 이름표를 딱딱 붙여두는 것이 데이터 스트럭쳐입니다"}, {"start": 272.44, "end": 274.64, "text": "아 서랍장을 짜는 거군요?"}, {"start": 274.64, "end": 275.64, "text": "맞습니다"}, {"start": 275.64, "end": 278.12, "text": "그래야 나중에 특정 아이템을 찾거나"}, {"start": 278.12, "end": 280.64, "text": "수치를 수정할 때 훨씬 용이하니까요"}, {"start": 280.64, "end": 284.64, "text": "그렇겠네요 레고 블록 찾듯이 뒤지면 안 되니까요"}, {"start": 284.64, "end": 287.59999999999997, "text": "그럼 관리가 편해지는 그 체계적인 서랍장"}, {"start": 287.59999999999997, "end": 291.47999999999996, "text": "즉 데이터 구조의 종류에는 크게 어떤 형태들이 있는 건가요?"}, {"start": 291.47999999999996, "end": 294.59999999999997, "text": "데이터 구조 중 가장 기본이 되는 건 리스트입니다"}, {"start": 294.59999999999997, "end": 298.03999999999996, "text": "이건 연관된 데이터를 배열 형태로 연속적으로 나열해서"}, {"start": 298.03999999999996, "end": 300.32, "text": "순서대로 처리하는 선형 구조죠"}, {"start": 300.32, "end": 302.88, "text": "어 잠깐 그게 정확히 무슨 말이에요"}, {"start": 302.88, "end": 306.88, "text": "연속적으로 나열한다는 게 게임 속에서는 어떤 식으로 작동하는 건가요?"}, {"start": 306.88, "end": 310.03999999999996, "text": "마치 기차 좌석번호표를 생각하시면 됩니다"}, {"start": 310.03999999999996, "end": 312.71999999999997, "text": "데이터가 메모리상에 순서대로 딱 붙어있거든요"}, {"start": 312.72, "end": 315.48, "text": "오 딱 붙어있으면 훑어보긴 좋겠네요"}, {"start": 315.48, "end": 320.24, "text": "네 그래서 서버 입출력이 빈번할 때 검색 속도는 엄청 빠릅니다"}, {"start": 320.24, "end": 321.56, "text": "그런데 문제가 안에 있어요"}, {"start": 321.56, "end": 322.56, "text": "무슨 문제요?"}, {"start": 322.56, "end": 325.40000000000003, "text": "중간에 누가 새치기를 해서 끼어들거나"}, {"start": 325.40000000000003, "end": 327.36, "text": "한 명이 빠지면 어떻게 될까요?"}, {"start": 327.36, "end": 331.20000000000005, "text": "뒤에 있는 좌석번호를 전부 다 밀고 당겨서 재배치해야 하거든요"}, {"start": 331.20000000000005, "end": 334.76000000000005, "text": "그래서 삽입과 삭제가 굉장히 느려지는 특징이 있습니다"}, {"start": 334.76000000000005, "end": 339.76000000000005, "text": "아하 검색은 빠르지만 중간에 뭘 끼워놓기 어렵다는 거군요"}, {"start": 339.76, "end": 343.32, "text": "그럼 반대로 유저가 방금 한 행동을 취소하거나"}, {"start": 343.32, "end": 347.56, "text": "순서를 거꾸로 되돌려야 하는 상황의 데이터는 어떻게 관리되는 건가요?"}, {"start": 347.56, "end": 350.44, "text": "그럴 때 등장하는 게 바로 스택입니다"}, {"start": 350.44, "end": 353.15999999999997, "text": "마지막에 들어온 데이터를 가장 먼저 꺼내는"}, {"start": 353.15999999999997, "end": 356.24, "text": "선입, 후출 방식의 데이터 구조를 스택이라고 부릅니다"}, {"start": 356.24, "end": 358.24, "text": "오 그게 정확히 무슨 말이에요?"}, {"start": 358.24, "end": 361.59999999999997, "text": "먼저 들어온 게 아니라 마지막에 들어온 걸 먼저 뺀다는 게"}, {"start": 361.59999999999997, "end": 363.59999999999997, "text": "직관적으로 잘 와닿지가 않는데요?"}, {"start": 363.59999999999997, "end": 367.88, "text": "우리가 게임 설정창에서 이것저것 건드리다가 작업 취소"}, {"start": 367.92, "end": 370.52, "text": "그러니까 뒤로 가기 버튼을 누를 때를 생각해보세요"}, {"start": 370.52, "end": 372.04, "text": "네네 자주 들죠"}, {"start": 372.04, "end": 375.12, "text": "그때 가장 마지막에 했던 행동 기록부터"}, {"start": 375.12, "end": 379.12, "text": "먼저 꺼내서 지워야 원래 상태로 깔끔하게 돌아갈 수 있거든요"}, {"start": 379.12, "end": 382.92, "text": "식당에서 맨 위에 쌓아둔 접시를 제일 먼저 빼서 쓰는 원리와 같습니다"}, {"start": 382.92, "end": 386.56, "text": "아 설거지 탑처럼 위에서부터 하나씩 치우는 거군요?"}, {"start": 386.56, "end": 387.96, "text": "이해가 확 되네요"}, {"start": 387.96, "end": 390.68, "text": "그럼 뒤로 가기처럼 거꾸로 빼는 게 아니라"}, {"start": 390.68, "end": 393.71999999999997, "text": "접속제가 폭주할 때처럼 온전히 먼저 온 사람부터"}, {"start": 393.71999999999997, "end": 396.4, "text": "공평하게 처리해줘야 할 때는 어떻게 되는 건가요?"}, {"start": 396.4, "end": 398.2, "text": "네 아주 좋은 질문입니다"}, {"start": 398.2, "end": 400.84, "text": "그럴 때는 먼저 들어온 데이터를 무조건 먼저 처리하는"}, {"start": 400.84, "end": 402.76, "text": "선입 선출 방식의 데이터 구조"}, {"start": 402.76, "end": 405.15999999999997, "text": "즉 Q라고 하는 구조를 사용합니다"}, {"start": 405.15999999999997, "end": 406.88, "text": "그게 정확히 무슨 말이에요?"}, {"start": 406.88, "end": 409.35999999999996, "text": "먼저 온 순서대로 처리한다는 원칙이"}, {"start": 409.35999999999996, "end": 412.0, "text": "게임 시스템에선 주로 어디에 적용되나요?"}, {"start": 412.0, "end": 415.79999999999995, "text": "대작게임이 처음 오픈했을 때 혹시 접속 대기열 보신 적 있으시죠?"}, {"start": 415.79999999999995, "end": 418.4, "text": "아우 막 대기열 5천명 이렇게 뜨잖아요"}, {"start": 418.4, "end": 421.47999999999996, "text": "말한 순서대로 쌓는 구조들은 이해했는데"}, {"start": 421.47999999999996, "end": 424.32, "text": "마냥 입력 권한도 제한적이고"}, {"start": 424.32, "end": 427.96, "text": "뿌리에서부터 여러 갈래로 복잡하게 뻗어나가는 데이터들은"}, {"start": 427.96, "end": 429.48, "text": "어떻게 관리하는 건가요?"}, {"start": 429.48, "end": 434.12, "text": "그런 복잡한 상황에서는 비선형 구조인 트리를 씁니다"}, {"start": 434.12, "end": 437.12, "text": "하위 항목으로 갈수록 구조가 복잡해지거나"}, {"start": 437.12, "end": 441.48, "text": "저장값이 제각각인 데이터를 계층적으로 연결해 저장하는 방식이죠"}, {"start": 441.48, "end": 443.92, "text": "어 그게 정확히 무슨 말이에요?"}, {"start": 443.92, "end": 446.76, "text": "계층적이고 복잡한 하위 구조라는 게"}, {"start": 446.76, "end": 449.32, "text": "마치 족보나 가계도 같은 건가요?"}, {"start": 449.32, "end": 450.68, "text": "네 맞습니다"}, {"start": 450.68, "end": 453.8, "text": "대표적으로 게임의 스킬 트리를 보면 딱 알 수 있죠"}, {"start": 453.8, "end": 454.72, "text": "아 스킬 트리"}, {"start": 454.72, "end": 458.56, "text": "네 뿌리가 되는 기본 공격 스킬을 마스터해야만"}, {"start": 458.56, "end": 463.16, "text": "그 가지에 해당하는 화야마법이나 얼음마법을 해금할 수 있잖아요"}, {"start": 463.16, "end": 465.72, "text": "이처럼 조건과 연계성이 아주 복잡하게"}, {"start": 465.72, "end": 467.68, "text": "얽혀있는 데이터를 담을 때 사용합니다"}, {"start": 467.68, "end": 469.36, "text": "아하 그렇군요"}, {"start": 469.36, "end": 472.6, "text": "그럼 지금까지 배운 자료 구조들을 바탕으로"}, {"start": 472.6, "end": 476.6, "text": "실제 현업의 기획자들은 이 수많은 게임 데이터를 현장에서"}, {"start": 476.6, "end": 479.76, "text": "어떤 툴과 방식으로 체계화해서 관리하게 되는 건가요?"}, {"start": 479.76, "end": 483.04, "text": "기획자는 팀원 간 협업과 관리가 용이하도록"}, {"start": 483.04, "end": 487.84000000000003, "text": "엑셀을 활용해서 행과 열로 이루어진 데이터 테이블을 짭니다"}, {"start": 487.84000000000003, "end": 492.32, "text": "그리고 여기서 모든 데이트는 절대 중복되거나 변해서는 안 되는"}, {"start": 492.32, "end": 495.28000000000003, "text": "고유키, 즉 고유 아이디를 가져야만 합니다"}, {"start": 495.28000000000003, "end": 497.72, "text": "그게 정확히 무슨 말이에요?"}, {"start": 497.72, "end": 500.0, "text": "게임 서비스가 시작된 이후에"}, {"start": 500.0, "end": 503.84000000000003, "text": "약간 편의를 위해서 아이템의 고유 아이디 값을 수정하면"}, {"start": 503.84000000000003, "end": 506.12, "text": "안 되는 치명적인 이유라도 있나요?"}, {"start": 506.12, "end": 507.6, "text": "아주 치명적이죠"}, {"start": 507.6, "end": 512.0, "text": "예를 들어서 1111060이라는 숫자로 된"}, {"start": 512.0, "end": 514.72, "text": "빨간 포션의 고유 아이디가 있다고 치죠"}, {"start": 514.72, "end": 518.12, "text": "이걸 라이브 서비스 도중에 다른 번호로 바꿔버리면 어떻게 될까요?"}, {"start": 518.12, "end": 520.6, "text": "글쎄요, 인벤토리에서 사라지나요?"}, {"start": 520.6, "end": 522.2, "text": "더 끔찍합니다"}, {"start": 522.2, "end": 524.92, "text": "시스템이 캐릭터 체력을 회복시키려고"}, {"start": 524.92, "end": 528.24, "text": "원래 아이디를 막 찾으려다 영원히 못 찾게 되거든요"}, {"start": 528.24, "end": 528.8, "text": "헉!"}, {"start": 528.8, "end": 531.96, "text": "결국 데이터 없음 오류로 무한 루프에 빠져서"}, {"start": 531.96, "end": 535.28, "text": "게임 서버 전체가 셧다운되는 대참사가 벌어질 수 있습니다"}, {"start": 535.28, "end": 539.64, "text": "와, 포션 하나도 번호 바꾸는 게 그렇게 치명적이네요"}, {"start": 539.64, "end": 544.1999999999999, "text": "그럼 유저들의 레벨이나 인벤토리처럼 실시간으로 쉴 새 없이 변하는"}, {"start": 544.1999999999999, "end": 548.64, "text": "엄청난 양의 정보들은 어디에, 어떻게 들어가게 되는 건가요?"}, {"start": 548.64, "end": 550.72, "text": "그래서 데이터를 분리합니다"}, {"start": 550.72, "end": 555.52, "text": "캐릭터 기본 능력치 같은 고정된 데이터는 클라이언트 테이블에 두고요"}, {"start": 555.52, "end": 560.08, "text": "유저의 경험치나 접속 기록처럼 끊임없이 변하는 유동적인 내용은"}, {"start": 560.08, "end": 563.56, "text": "서버 테이블의 데이터베이스에 완전히 분리해서 저장합니다"}, {"start": 563.56, "end": 564.72, "text": "어, 잠시만요"}, {"start": 564.72, "end": 566.56, "text": "그게 정확히 무슨 말이에요?"}, {"start": 566.56, "end": 569.5999999999999, "text": "고정된 것과 유동적인 것을 굳이 나누고"}, {"start": 569.5999999999999, "end": 574.4799999999999, "text": "또 데이터 테이블에는 유저가 바꿀 수 없는 구현의 영역만 넣어야 한다는 건"}, {"start": 574.4799999999999, "end": 576.28, "text": "시스템 적어도 어떤 의미죠?"}, {"start": 576.28, "end": 579.4, "text": "쉽게 말해서 보안과 안정성 때문입니다"}, {"start": 579.4, "end": 582.9599999999999, "text": "몬스터 테이블에 AI 패턴 테이블을 연동시켜 두듯이"}, {"start": 582.9599999999999, "end": 585.64, "text": "해킹을 막고 정보 검증을 확실히 하기 위해서입니다"}, {"start": 585.64, "end": 588.1199999999999, "text": "아, 치트 프로그램 같은 거 막으려고요?"}, {"start": 588.1199999999999, "end": 589.4, "text": "네, 맞습니다"}, {"start": 589.4, "end": 594.28, "text": "기획자가 설정한 절대적인 법칙들만 클라이언트 쪽의 뼈대로 딱 남겨두고"}, {"start": 594.28, "end": 596.04, "text": "계속 변하는 결과물들은"}, {"start": 596.04, "end": 600.0, "text": "유저가 건드릴 수 없는 서버에서 별도로 굴리면서 관리한다는 뜻입니다"}, {"start": 600.0, "end": 601.1999999999999, "text": "그렇군요"}, {"start": 601.1999999999999, "end": 604.52, "text": "데이터를 그렇게 철저히 분리하고 연동해야 한다면"}, {"start": 604.52, "end": 607.76, "text": "기획자가 처음 이 거대한 테이블 구조를 짤 때"}, {"start": 607.76, "end": 610.1999999999999, "text": "무조건 지켜야 하는 작업 순서나"}, {"start": 610.1999999999999, "end": 612.92, "text": "절대 하면 안 되는 금기 사항은 무엇인가요?"}, {"start": 612.92, "end": 614.76, "text": "아주 중요한 룰이 있습니다"}, {"start": 614.76, "end": 620.04, "text": "시스템을 분석해서 첫 번째 컬럼에 무조건 ID를 배치하고"}, {"start": 620.04, "end": 623.24, "text": "영문 }, {"start": 700.4, "end": 703.24, "text": "청취자님도 이제 게임을 플레이 하실 때"}, {"start": 703.24, "end": 706.6, "text": "보이지 않던 거대한 뼈대가 느껴지시길 바랍니다"}, {"start": 706.6, "end": 709.68, "text": "우리가 게임 속에서 가볍게 휘두르는 칼 한 번"}, {"start": 709.68, "end": 711.9599999999999, "text": "마시는 포션 한 병의 이면에는"}, {"start": 711.9599999999999, "end": 715.3599999999999, "text": "사실 수백만 개의 숫자와 구조가 맞물려 돌아가는"}, {"start": 715.3599999999999, "end": 718.0799999999999, "text": "데이터의 우주가 존재합니다"}, {"start": 718.0799999999999, "end": 720.3599999999999, "text": "결국 훌륭한 게임 기획이란"}, {"start": 720.3599999999999, "end": 722.7199999999999, "text": "눈에 보이는 화려한 그래픽 이전에"}, {"start": 722.7199999999999, "end": 725.3199999999999, "text": "보이지 않는 데이터 테이블의 열과 행을"}, {"start": 725.3199999999999, "end": 729.3599999999999, "text": "얼마나 견고하고 철저하게 설계하느냐에 달려 있다는 사실이"}, {"start": 729.3599999999999, "end": 731.64, "text": "오늘 분석이 남긴 가장 큰 통찰입니다"}, {"start": 731.64, "end": 735.16, "text": "확 넓혀줄 흥미롭고 깊이 있는 자료와 함께"}, {"start": 735.16, "end": 736.92, "text": "다시 돌아오겠습니다"}, {"start": 736.92, "end": 738.5999999999999, "text": "함께 해주셔서 감사합니다"}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    // 오디오 전체 길이: audioSlides의 마지막 end 또는 audio.duration
    const totalDur = audioSlides.length > 0
        ? Math.max(...audioSlides.map(s => s.end || 0))
        : 1;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const left = (s.start / totalDur) * 100;
        const width = ((s.end - s.start) / totalDur) * 100;
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.left = left + '%';
        seg.style.width = width + '%';
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.textContent = '▶';
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

init();

</script>
